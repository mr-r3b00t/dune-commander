<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dune: Commander</title>
    <link rel="stylesheet" href="style.css?v=33">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="sidebar">
            <div id="house-banner">
                <span id="house-name">HOUSE ATREIDES</span>
            </div>
            <div id="resource-panel">
                <div class="resource">
                    <span class="resource-label">CREDITS</span>
                    <span id="credits">1000</span>
                </div>
                <div class="resource">
                    <span class="resource-label">SPICE</span>
                    <span id="spice-stored">0</span>
                </div>
                <div class="resource">
                    <span class="resource-label">POWER</span>
                    <span id="power">0 / 0</span>
                </div>
            </div>
            <div id="minimap-container">
                <canvas id="minimap"></canvas>
            </div>
            <div id="build-panel">
                <div id="build-tabs">
                    <button class="build-tab active" data-tab="structures">STRUCTURES</button>
                    <button class="build-tab" data-tab="units">UNITS</button>
                </div>
                <div id="build-list"></div>
            </div>
            <div id="info-panel">
                <div id="selection-info"></div>
            </div>
            <div id="music-controls" style="padding: 6px 10px; border-top: 1px solid #444; display: flex; align-items: center; gap: 8px;">
                <button id="music-toggle" style="background: #333; color: #cda; border: 1px solid #555; padding: 3px 10px; cursor: pointer; font-size: 12px; font-family: monospace;">🎵 Music: ON</button>
                <span style="color: #888; font-size: 10px;">[M]</span>
            </div>
        </div>
    </div>
    <div id="main-menu" class="overlay">
        <div class="menu-content">
            <h1>DUNE: COMMANDER</h1>
            <p class="subtitle">The Battle for Arrakis</p>
            <div class="difficulty-select">
                <h2>DIFFICULTY</h2>
                <div class="difficulties">
                    <button class="diff-btn active" data-diff="easy">
                        <span>EASY</span>
                        <small>Forgiving enemy</small>
                    </button>
                    <button class="diff-btn" data-diff="medium">
                        <span>MEDIUM</span>
                        <small>Balanced fight</small>
                    </button>
                    <button class="diff-btn" data-diff="hard">
                        <span>HARD</span>
                        <small>Ruthless AI</small>
                    </button>
                </div>
            </div>
            <div class="house-select">
                <h2>SELECT YOUR HOUSE</h2>
                <div class="houses">
                    <button class="house-btn" data-house="atreides">
                        <div class="house-icon atreides-icon"></div>
                        <span>ATREIDES</span>
                        <small>Honorable &amp; Defensive</small>
                    </button>
                    <button class="house-btn" data-house="harkonnen">
                        <div class="house-icon harkonnen-icon"></div>
                        <span>HARKONNEN</span>
                        <small>Brutal &amp; Powerful</small>
                    </button>
                    <button class="house-btn" data-house="ordos">
                        <div class="house-icon ordos-icon"></div>
                        <span>ORDOS</span>
                        <small>Cunning &amp; Stealthy</small>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Game Over Modal -->
    <div id="game-over-modal" class="overlay hidden">
        <div class="modal-content">
            <div id="game-over-icon" class="modal-icon"></div>
            <h1 id="game-over-title"></h1>
            <p id="game-over-message" class="modal-message"></p>
            <div class="modal-stats" id="game-over-stats"></div>
            <div class="modal-buttons">
                <button id="game-over-restart" class="modal-btn primary">NEW BATTLE</button>
                <button id="game-over-menu" class="modal-btn">MAIN MENU</button>
            </div>
        </div>
    </div>
    <script src="js/constants.js?v=33"></script>
    <script src="js/utils.js?v=33"></script>
    <script src="js/map.js?v=33"></script>
    <script src="js/pathfinding.js?v=33"></script>
    <script src="js/entity.js?v=33"></script>
    <script src="js/buildings.js?v=33"></script>
    <script src="js/units.js?v=33"></script>
    <script src="js/projectile.js?v=33"></script>
    <script src="js/particles.js?v=33"></script>
    <script src="js/ai.js?v=33"></script>
    <script src="js/ui.js?v=33"></script>
    <script src="js/sprites.js?v=33"></script>
    <script src="js/audio.js?v=33"></script>
    <script src="js/game.js?v=33"></script>
    <script src="js/main.js?v=33"></script>
</body>
</html>
